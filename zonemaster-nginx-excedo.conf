server {
    listen 80;
    server_name zonemaster.excedonet.net;
    return 301 https://zonemaster.excedo.online$request_uri;
}

server {
    listen 443 ssl;
    server_name zonemaster.excedonet.net;

    ssl_certificate /etc/apache2/ssl/excedonet_net.crt;
    ssl_certificate_key /etc/apache2/ssl/excedonet_net.key;

    return 301 https://zonemaster.excedo.online$request_uri;
}

server {
    listen 443 ssl;
    server_name zonemaster.excedo.online;

    ssl_certificate /etc/apache2/ssl/excedo_online.crt;
    ssl_certificate_key /etc/apache2/ssl/excedo_online.key;

    root /var/www/html/zonemaster-gui-excedo/public/dist;
    index index.html;

    location /api {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ ^/result/[^/]+/?$ {
        try_files /en/result/id/index.html =404;
    }

    location ~ ^/(en|sv|da|es|fi|fr|nb|sl)/result/[^/]+/?$ {
        try_files /$1/result/id/index.html =404;
    }
}
